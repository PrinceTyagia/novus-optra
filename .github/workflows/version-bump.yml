name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      release_notes:
        description: 'Release notes / changelog'
        required: false
        default: 'Bug fixes and improvements.'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Read current version
        id: current
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          IFS='.' read -r -a parts <<< "$CURRENT"
          MAJOR=${parts[0]}
          MINOR=${parts[1]}
          PATCH=${parts[2]}

          case "${{ github.event.inputs.bump_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Bump version in all config files
        env:
          NEW_VER: ${{ steps.new_version.outputs.version }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.NEW_VER;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Updated package.json to ' + process.env.NEW_VER);
          "

          # Update tauri.conf.json
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = process.env.NEW_VER;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            console.log('Updated tauri.conf.json to ' + process.env.NEW_VER);
          "

          # Update Cargo.toml (only the [package] version line at the top)
          sed -i "0,/^version = \".*\"/s/^version = \".*\"/version = \"$NEW_VER\"/" src-tauri/Cargo.toml
          echo "Updated Cargo.toml to $NEW_VER"

          # Update updater.json using env vars (safe from injection)
          node -e "
            const fs = require('fs');
            const u = JSON.parse(fs.readFileSync('updater.json', 'utf8'));
            u.version = process.env.NEW_VER;
            u.notes = process.env.RELEASE_NOTES;
            u.pub_date = '$NOW';
            // Update download URLs
            for (const platform of Object.keys(u.platforms)) {
              u.platforms[platform].url = u.platforms[platform].url.replace(/\/v[^/]+\//, '/v' + process.env.NEW_VER + '/');
            }
            fs.writeFileSync('updater.json', JSON.stringify(u, null, 2) + '\n');
            console.log('Updated updater.json to ' + process.env.NEW_VER);
          "

      - name: Commit version bump
        env:
          NEW_VER: ${{ steps.new_version.outputs.version }}
        run: |
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml updater.json
          git commit -m "chore: bump version to v${NEW_VER} [skip ci]"
          git push origin main
          echo "Committed version bump to main"

      - name: Create and push Git tag
        env:
          NEW_VER: ${{ steps.new_version.outputs.version }}
        run: |
          git tag "v${NEW_VER}"
          git push origin "v${NEW_VER}"
          echo "Created and pushed tag v${NEW_VER}"

      - name: Job summary
        run: |
          echo "## ✅ Version Bumped" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Previous | v${{ steps.current.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| New | v${{ steps.new_version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | ${{ github.event.inputs.bump_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🏷️ Tag **v${{ steps.new_version.outputs.version }}** created → **Release Build** workflow will trigger automatically!"  >> $GITHUB_STEP_SUMMARY
