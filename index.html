<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novus Optra</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <style>
    /* Splash screen styles */
    body {
      margin: 0;
      padding: 0;
      background-color: #03000a;
      overflow: hidden;
    }

    .splashscreen-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #0c061a 0%, #030009 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      font-family: 'Outfit', sans-serif;
      color: #ffffff;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
    }

    .splashscreen-wrapper.fade-out {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.04);
    }

    .splash-background-glow {
      position: absolute;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.18) 0%, rgba(59, 130, 246, 0.04) 50%, transparent 100%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(35px);
      pointer-events: none;
      animation: pulse-glow 7s infinite alternate ease-in-out;
    }

    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 10;
    }

    .logo-container {
      position: relative;
      margin-bottom: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .outer-ring {
      transform-origin: center;
      animation: rotate-ring 20s linear infinite;
    }

    @keyframes rotate-ring {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse-glow {
      0% {
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(0.9);
      }

      100% {
        opacity: 1.1;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    .splash-logo {
      filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.5));
    }

    .logo-circle-1 {
      transform-origin: center;
      animation: pulse-circle 4s ease-in-out infinite alternate;
    }

    @keyframes pulse-circle {
      0% {
        stroke-dashoffset: 20;
        opacity: 0.7;
      }

      100% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
    }

    .splash-title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 5px;
      margin: 0 0 6px 0;
      background: linear-gradient(135deg, #ffffff 30%, #a78bfa 75%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      animation: slide-up 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .splash-subtitle {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 7px;
      color: rgba(167, 139, 250, 0.6);
      margin: 0 0 45px 0;
      text-transform: uppercase;
      text-indent: 7px;
      animation: slide-up 1.1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .loader-container {
      width: 280px;
      animation: fade-in 1.4s ease-out;
    }

    .loader-track {
      height: 4px;
      width: 100%;
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
      position: relative;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.4);
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.8);
      transition: width 0.2s cubic-bezier(0.1, 0.8, 0.25, 1);
    }

    .loader-status {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.5px;
    }

    #loader-percent {
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
    }

    @keyframes slide-up {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-in {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <!-- Splash Screen Structure -->
  <div id="splashscreen-wrapper" class="splashscreen-wrapper">
    <div class="splash-background-glow"></div>
    <div class="splash-content">
      <div class="logo-container">
        <svg class="splash-logo" width="100" height="100" viewBox="0 0 100 100" fill="none"
          xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logo-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#3b82f6" />
              <stop offset="50%" stop-color="#8b5cf6" />
              <stop offset="100%" stop-color="#ec4899" />
            </linearGradient>
            <linearGradient id="logo-grad-2" x1="100%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#00f2fe" />
              <stop offset="100%" stop-color="#4facfe" />
            </linearGradient>
            <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="5" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <!-- Rotating outer dotted ring -->
          <circle class="outer-ring" cx="50" cy="50" r="42" stroke="url(#logo-grad-2)" stroke-width="2"
            stroke-dasharray="6 8" fill="none" />
          <!-- Static internal ring -->
          <circle cx="50" cy="50" r="32" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" fill="none" />
          <!-- Interlocking N & O Monogram -->
          <path class="logo-path-1" d="M35 64 V36 L65 64 V36" stroke="url(#logo-grad-1)" stroke-width="5.5"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-glow)" />
          <circle class="logo-circle-1" cx="50" cy="50" r="18" stroke="url(#logo-grad-2)" stroke-width="3"
            stroke-dasharray="100 20" stroke-dashoffset="10" fill="none" filter="url(#neon-glow)" />
        </svg>
      </div>

      <h1 class="splash-title">Novus Optra</h1>
      <p class="splash-subtitle">Platform v0.1.3</p>

      <div class="loader-container">
        <div class="loader-track">
          <div id="loader-bar" class="loader-bar"></div>
        </div>
        <div class="loader-status">
          <span id="loader-status-text">Initializing core systems...</span>
          <span id="loader-percent">0%</span>
        </div>
      </div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
